<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="전기레터">
  <title>전기레터</title>
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #eef4f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      position: fixed;
      inset: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .viewport {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: env(safe-area-inset-top);
      padding-right: 24px;
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: 24px;
      box-sizing: border-box;
      background: #eef4f7;
    }

    .card {
      width: 100%;
      max-width: 320px;
      text-align: center;
      box-sizing: border-box;
    }

    .icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
      color: #1e2f45;
      word-break: keep-all;
    }

    .desc {
      font-size: 14px;
      line-height: 1.6;
      color: #5a7a88;
      margin-bottom: 22px;
      word-break: keep-all;
    }

    .open-btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      background: #1e3d6b;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      line-height: 1;
      -webkit-appearance: none;
      appearance: none;
      border: none;
      outline: none;
      box-shadow: none;
      transform: none;
      transition: none;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .open-btn:visited,
    .open-btn:hover,
    .open-btn:focus,
    .open-btn:active {
      color: #fff;
      text-decoration: none;
      background: #1e3d6b;
      outline: none;
      box-shadow: none;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="card">
      <div class="icon">📮</div>
      <div class="title">전기요금 정보 Letter</div>
      <div class="desc">홈 화면에 먼저 추가한 뒤 사용하세요.</div>
      <a class="open-btn"
         href="https://script.google.com/macros/s/AKfycbz6txALy_4dgrwM43nd2S0fJhxpbThhvyXGEZ3Et9OTJqccuSnO1dv0U_eREyy2V2mNJA/exec">
        앱 열기
      </a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iPhone 홈화면 앱 설정 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="요금 20N">
  <meta name="theme-color" content="#eef4f7">

  <title>전기요금 채널 20N</title>

  <!-- 홈화면 아이콘 -->
  <link rel="apple-touch-icon" sizes="180x180" href="https://kiraoov-blip.github.io/newsletter-icons/apple-touch-icon-20n.png?v=20260419-2">
  <link rel="icon" type="image/png" href="https://kiraoov-blip.github.io/newsletter-icons/apple-touch-icon-20n.png?v=20260419-2">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #eef4f7;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      position: fixed;
      inset: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .viewport {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top) + 16px)
        24px
        calc(env(safe-area-inset-bottom) + 16px)
        24px;
      box-sizing: border-box;
      background: #eef4f7;
    }

    .card {
      width: 100%;
      max-width: 320px;
      text-align: center;
      box-sizing: border-box;
    }

    .icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
      color: #1e2f45;
      word-break: keep-all;
    }

    .desc {
      font-size: 14px;
      line-height: 1.6;
      color: #5a7a88;
      margin-bottom: 22px;
      word-break: keep-all;
    }

    .open-btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      background: #1e3d6b;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      border: 0;
      outline: none;
      box-shadow: none;
      appearance: none;
      -webkit-appearance: none;
      transform: none !important;
      transition: none !important;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
    }

    .open-btn:hover,
    .open-btn:focus,
    .open-btn:active {
      background: #1e3d6b;
      color: #fff;
      outline: none;
      box-shadow: none;
      transform: none !important;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="card">
      <div class="icon">📮</div>
      <div class="title">전기요금 채널 20N</div>
      <div class="desc">홈 화면에 먼저 추가한 뒤 사용하세요.</div>

      <a
        class="open-btn"
        href="https://script.google.com/macros/s/AKfycbxiGqIQ6JRjbIq0S_wveLwQNtpjctxgtfJZXF-GENYHFaa02v3dfRyK45foOPy9B2PUvQ/exec"
      >
        앱 열기
      </a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="요금레터">
  <title>요금레터</title>
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #eef4f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      position: fixed;
      inset: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .viewport {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top) + 16px)
        24px
        calc(env(safe-area-inset-bottom) + 16px)
        24px;
      box-sizing: border-box;
      background: #eef4f7;
    }

    .card {
      width: 100%;
      max-width: 320px;
      text-align: center;
      box-sizing: border-box;
    }

    .icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
      color: #1e2f45;
      word-break: keep-all;
    }

    .desc {
      font-size: 14px;
      line-height: 1.6;
      color: #5a7a88;
      margin-bottom: 22px;
      word-break: keep-all;
    }

    .open-btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      background: #1e3d6b;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      border: 0;
      outline: none;
      box-shadow: none;
      appearance: none;
      -webkit-appearance: none;
      transform: none !important;
      transition: none !important;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .open-btn:hover,
    .open-btn:focus,
    .open-btn:active {
      background: #1e3d6b;
      color: #fff;
      outline: none;
      box-shadow: none;
      transform: none !important;
    }

    .msg {
      margin-top: 14px;
      font-size: 13px;
      color: #5a7a88;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="card">
      <div class="icon">📮</div>
      <div class="title">요금레터</div>
      <div class="desc">홈 화면에 먼저 추가한 뒤 사용하세요.</div>
      <button type="button" class="open-btn" onclick="openApp()">앱 열기</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_BASE = "https://script.google.com/macros/s/AKfycbz6txALy_4dgrwM43nd2S0fJhxpbThhvyXGEZ3Et9OTJqccuSnO1dv0U_eREyy2V2mNJA/exec";

    function getSavedToken() {
      try {
        return localStorage.getItem('approvedUserToken') || '';
      } catch (e) {
        return '';
      }
    }

    function saveToken(token) {
      try {
        if (token) localStorage.setItem('approvedUserToken', token);
      } catch (e) {}
    }

    function getPendingEmail() {
      try {
        return localStorage.getItem('pendingUserEmail') || '';
      } catch (e) {
        return '';
      }
    }

    function clearPendingEmail() {
      try {
        localStorage.removeItem('pendingUserEmail');
      } catch (e) {}
    }

    function setMsg(text) {
      const el = document.getElementById('msg');
      if (el) el.textContent = text || '';
    }

    function moveToApp(token) {
      const url = token
        ? `${APPS_SCRIPT_BASE}?token=${encodeURIComponent(token)}`
        : APPS_SCRIPT_BASE;
      window.location.href = url;
    }

    async function fetchTokenByEmail(email) {
      const url = `${APPS_SCRIPT_BASE}?mode=getTokenByEmail&email=${encodeURIComponent(email)}`;
      const res = await fetch(url, { method: 'GET' });
      if (!res.ok) throw new Error('token fetch failed');
      return await res.json();
    }

    async function openApp() {
      const savedToken = getSavedToken();
      if (savedToken) {
        moveToApp(savedToken);
        return;
      }

      const pendingEmail = getPendingEmail();
      if (!pendingEmail) {
        moveToApp('');
        return;
      }

      try {
        setMsg('승인 상태를 확인하는 중...');
        const result = await fetchTokenByEmail(pendingEmail);

        if (result && result.success && result.token) {
          saveToken(result.token);
          clearPendingEmail();
          moveToApp(result.token);
          return;
        }

        if (result && result.pending) {
          setMsg('아직 승인 대기 중입니다.');
          moveToApp('');
          return;
        }

        moveToApp('');
      } catch (e) {
        setMsg('상태 확인 후 앱으로 이동합니다.');
        moveToApp('');
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="요금 20N">
  <meta name="theme-color" content="#ffffff">

  <title>전기요금 채널 20N</title>

  <link rel="apple-touch-icon" sizes="180x180" href="https://kiraoov-blip.github.io/newsletter-icons/apple-touch-icon-20n.png?v=20260419-2">
  <link rel="icon" type="image/png" href="https://kiraoov-blip.github.io/newsletter-icons/apple-touch-icon-20n.png?v=20260419-2">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      position: fixed;
      inset: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      color: #1f3248;
    }

    .viewport {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top) + 20px)
        24px
        calc(env(safe-area-inset-bottom) + 20px)
        24px;
      box-sizing: border-box;
      background: #ffffff;
    }

    .card {
      width: 100%;
      max-width: 340px;
      text-align: center;
      box-sizing: border-box;
    }

    .icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 14px;
    }

    .title {
      font-size: 23px;
      font-weight: 800;
      line-height: 1.35;
      margin-bottom: 8px;
      color: #1e2f45;
      word-break: keep-all;
      letter-spacing: -0.2px;
    }

    .sub {
      font-size: 14px;
      line-height: 1.6;
      color: #60798a;
      margin-bottom: 24px;
      word-break: keep-all;
    }

    .open-btn {
      width: 64px;
      height: 64px;
      margin: 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff 0%, #f4f9fb 100%);
      border: 1px solid #cfe0e8;
      box-shadow:
        0 6px 16px rgba(30, 61, 107, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.95);
      text-decoration: none;
      appearance: none;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .open-btn:hover,
    .open-btn:focus {
      background: linear-gradient(180deg, #ffffff 0%, #edf6f9 100%);
      box-shadow:
        0 8px 20px rgba(30, 61, 107, 0.11),
        inset 0 1px 0 rgba(255,255,255,0.98);
      outline: none;
    }

    .open-btn:active {
      transform: scale(0.98);
      background: linear-gradient(180deg, #f7fbfc 0%, #e6f1f5 100%);
    }

    .play-icon {
      width: 0;
      height: 0;
      margin-left: 4px;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      border-left: 20px solid #1e3d6b;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="card">
      <div class="icon">📮</div>
      <div class="title">전기요금 채널 20N</div>
      <div class="sub">국내외 전기요금 관련 기사를 빠르게 확인하세요.</div>

      <a
        class="open-btn"
        href="https://script.google.com/macros/s/AKfycbwz3Nb6WTWnhCutrMXDxit2SgFs0rYPA7OrNWu2X5aBJENhbCv94U5NMGi9ALh0EIU1Bg/exec"
        aria-label="앱 열기"
      >
        <span class="play-icon"></span>
      </a>
    </div>
  </div>
</body>
</html>

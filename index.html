<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="요금 20N">
  <meta name="theme-color" content="#eef4f7">

  <title>전기요금 채널 20N</title>

  <link rel="apple-touch-icon" sizes="180x180" href="https://kiraoov-blip.github.io/newsletter-icons/apple-touch-icon-20n.png?v=20260419-2">
  <link rel="icon" type="image/png" href="https://kiraoov-blip.github.io/newsletter-icons/apple-touch-icon-20n.png?v=20260419-2">

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, #f6fbfc 0%, #eef4f7 45%, #e8f0f4 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      position: fixed;
      inset: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      color: #1f3248;
    }

    .viewport {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top) + 20px)
        24px
        calc(env(safe-area-inset-bottom) + 20px)
        24px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 340px;
      text-align: center;
      box-sizing: border-box;
      padding: 28px 24px 24px 24px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 12px 32px rgba(30, 61, 107, 0.08),
        0 2px 8px rgba(46, 95, 110, 0.06);
      border: 1px solid rgba(209, 224, 232, 0.9);
    }

    .icon-wrap {
      width: 84px;
      height: 84px;
      margin: 0 auto 16px auto;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f8fcfd 0%, #e8f2f6 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.9),
        0 6px 16px rgba(30, 61, 107, 0.08);
      border: 1px solid #d8e6ec;
    }

    .icon {
      font-size: 44px;
      line-height: 1;
    }

    .title {
      font-size: 23px;
      font-weight: 800;
      line-height: 1.35;
      margin-bottom: 8px;
      color: #1e2f45;
      word-break: keep-all;
      letter-spacing: -0.2px;
    }

    .sub {
      font-size: 14px;
      line-height: 1.6;
      color: #60798a;
      margin-bottom: 24px;
      word-break: keep-all;
    }

    .open-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 144px;
      padding: 13px 20px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff 0%, #f4f9fb 100%);
      color: #1e3d6b;
      font-size: 16px;
      font-weight: 800;
      line-height: 1;
      text-decoration: none;
      border: 1px solid #cfe0e8;
      box-shadow:
        0 6px 16px rgba(30, 61, 107, 0.08),
        inset 0 1px 0 rgba(255,255,255,0.95);
      appearance: none;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .open-btn:hover,
    .open-btn:focus {
      background: linear-gradient(180deg, #ffffff 0%, #edf6f9 100%);
      color: #1e3d6b;
      box-shadow:
        0 8px 20px rgba(30, 61, 107, 0.11),
        inset 0 1px 0 rgba(255,255,255,0.98);
      outline: none;
    }

    .open-btn:active {
      transform: scale(0.98);
      background: linear-gradient(180deg, #f7fbfc 0%, #e6f1f5 100%);
    }

    .open-btn .btn-icon {
      font-size: 15px;
      line-height: 1;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #8aa0ad;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="card">
      <div class="icon-wrap">
        <div class="icon">📮</div>
      </div>

      <div class="title">전기요금 채널 20N</div>
      <div class="sub">국내외 전기요금 관련 기사를 빠르게 확인하세요.</div>

      <a
        class="open-btn"
        href="https://script.google.com/macros/s/AKfycbzrkNBHVvLdp1aVKE1-EAEKiff-q0_wop4p6bAvOYdErDOrw_e8VFnokfar6pi8LvSqoA/exec"
      >
        <span class="btn-icon">⚡</span>
        <span>앱 열기</span>
      </a>

      <div class="note">홈화면에 추가한 뒤 실행하면 더 편리합니다.</div>
    </div>
  </div>
</body>
</html>
